<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KeluargaApp</title>
    
    <!-- PWA Requirements -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8fbcf5">
    <link rel="apple-touch-icon" href="icon-192px.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FDFBF7',
                        primary: '#60A5FA', // Biru Muda
                        primaryDark: '#3B82F6',
                    },
                    boxShadow: {
                        'soft': '0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01)',
                        'card': '0 4px 20px -2px rgba(0,0,0,0.05)'
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .tab-content { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-cream text-gray-800 min-h-screen relative pb-20">

    <!-- Main Container -->
    <main id="app-container" class="max-w-md mx-auto min-h-screen p-4 flex flex-col">
        <!-- Loading State -->
        <div class="flex-1 flex items-center justify-center">
            <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-primary"></i>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto glass-nav rounded-t-[2rem] shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.05)] border-t border-gray-100 flex justify-between px-6 py-4 z-50">
        <button class="nav-btn flex flex-col items-center gap-1 text-primary w-16" data-tab="beranda">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] font-semibold">Beranda</span>
        </button>
        <button class="nav-btn flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors w-16" data-tab="catat">
            <i data-lucide="plus-circle" class="w-6 h-6"></i>
            <span class="text-[10px] font-semibold">Catat</span>
        </button>
        <button class="nav-btn flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors w-16" data-tab="riwayat">
            <i data-lucide="clock" class="w-6 h-6"></i>
            <span class="text-[10px] font-semibold">Riwayat</span>
        </button>
        <button class="nav-btn flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors w-16" data-tab="profil">
            <i data-lucide="user" class="w-6 h-6"></i>
            <span class="text-[10px] font-semibold">Profil</span>
        </button>
    </nav>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>

    <!-- Firebase & App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase
        // Catatan: Jika di-deploy di GitHub, pengguna harus mengganti ini dengan config Firebase milik mereka sendiri.
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            // Placeholder untuk deployment eksternal (GitHub)
            firebaseConfig = {
                apiKey: "GANTI_DENGAN_API_KEY_ANDA",
                authDomain: "GANTI_DENGAN_AUTH_DOMAIN_ANDA",
                projectId: "GANTI_DENGAN_PROJECT_ID_ANDA",
                storageBucket: "GANTI_DENGAN_STORAGE_BUCKET_ANDA",
                messagingSenderId: "GANTI_DENGAN_SENDER_ID_ANDA",
                appId: "GANTI_DENGAN_APP_ID_ANDA"
            };
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'keluarga-app-v1';
        
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) {
            console.error("Firebase init error:", e);
        }

        // State Aplikasi
        let isFirebaseReady = false;
        let authUser = null;
        let currentView = 'login'; // login, register, beranda, catat, riwayat, profil
        let activeTab = 'beranda';
        
        // Data State
        let allFamilies = [];
        let allMembers = [];
        let allTransactions = [];
        let currentFamily = null;
        let currentMember = null;
        
        // Listeners
        let unsubFamilies, unsubMembers, unsubTransactions;

        // DOM Elements
        const appContainer = document.getElementById('app-container');
        const bottomNav = document.getElementById('bottom-nav');

        // Formatter Uang
        const formatRp = (angka) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        };
        const formatDate = (dateStr) => {
            const d = new Date(dateStr);
            return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
        };

        // Initialize App
        const initApp = async () => {
            if(!auth) {
                renderError("Firebase belum dikonfigurasi. Ganti firebaseConfig di kode jika di GitHub.");
                return;
            }

            try {
                // Aturan 3: Auth Sebelum Query
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        authUser = user;
                        isFirebaseReady = true;
                        setupRealtimeListeners();
                        
                        // Cek session login sederhana (Simpan email terakhir di localStorage untuk kemudahan)
                        const savedEmail = localStorage.getItem('keluargaApp_email');
                        if (savedEmail) {
                            // Tunggu data terload sebentar
                            setTimeout(() => attemptLogin(savedEmail), 1000);
                        } else {
                            renderAuth('login');
                        }
                    }
                });
            } catch (error) {
                console.error("Auth error:", error);
                renderError("Gagal terhubung ke database.");
            }
        };

        // Realtime Listeners (Aturan 1 & 2: Path ketat & tanpa query kompleks, filter di JS)
        const setupRealtimeListeners = () => {
            if (!authUser) return;

            const familiesRef = collection(db, 'artifacts', appId, 'public', 'data', 'families');
            const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
            const txRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');

            unsubFamilies = onSnapshot(familiesRef, (snapshot) => {
                allFamilies = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateUIIfLoggedIn();
            }, (err) => console.error(err));

            unsubMembers = onSnapshot(membersRef, (snapshot) => {
                allMembers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateUIIfLoggedIn();
            }, (err) => console.error(err));

            unsubTransactions = onSnapshot(txRef, (snapshot) => {
                allTransactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // Sort descending by date in memory (aturan 2 fallback)
                allTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));
                updateUIIfLoggedIn();
            }, (err) => console.error(err));
        };

        const updateUIIfLoggedIn = () => {
            if (currentMember && currentFamily) {
                // Refresh data if updated
                currentMember = allMembers.find(m => m.id === currentMember.id) || null;
                currentFamily = allFamilies.find(f => f.id === currentFamily.id) || null;
                if(currentView !== 'login' && currentView !== 'register') {
                    renderMainApp(activeTab);
                }
            }
        };

        // --- AUTHENTICATION LOGIC ---

        const attemptLogin = (email) => {
            const member = allMembers.find(m => m.email.toLowerCase() === email.toLowerCase());
            if (member) {
                const family = allFamilies.find(f => f.id === member.familyId);
                if (family) {
                    currentMember = member;
                    currentFamily = family;
                    localStorage.setItem('keluargaApp_email', email);
                    activeTab = 'beranda';
                    renderMainApp('beranda');
                    return true;
                }
            }
            return false;
        };

        const handleRegisterFamily = async (email, familyName, memberName) => {
            if (!authUser) return;
            showLoadingOverlay();
            try {
                // Cek jika email sudah terdaftar
                if (allMembers.find(m => m.email.toLowerCase() === email.toLowerCase())) {
                    alert("Email sudah terdaftar!");
                    hideLoadingOverlay();
                    return;
                }

                // 1. Buat Keluarga Baru
                const familiesRef = collection(db, 'artifacts', appId, 'public', 'data', 'families');
                const familyDoc = await addDoc(familiesRef, {
                    name: familyName,
                    createdAt: new Date().toISOString()
                });

                // 2. Buat Anggota Pertama (sebagai pendaftar/kepala)
                const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                await addDoc(membersRef, {
                    familyId: familyDoc.id,
                    email: email.toLowerCase(),
                    name: memberName,
                    dob: '',
                    status: 'Kepala Keluarga',
                    createdAt: new Date().toISOString()
                });

                // Login otomatis
                setTimeout(() => {
                    attemptLogin(email);
                    hideLoadingOverlay();
                }, 1000); // Tunggu snapshot

            } catch (error) {
                console.error("Register err:", error);
                alert("Terjadi kesalahan.");
                hideLoadingOverlay();
            }
        };

        const handleAddMember = async (email, name, dob, status) => {
            if (!authUser || !currentFamily) return;
            
            if (allMembers.find(m => m.email.toLowerCase() === email.toLowerCase())) {
                alert("Email anggota ini sudah terdaftar!");
                return;
            }

            showLoadingOverlay();
            try {
                const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                await addDoc(membersRef, {
                    familyId: currentFamily.id,
                    email: email.toLowerCase(),
                    name: name,
                    dob: dob,
                    status: status,
                    createdAt: new Date().toISOString()
                });
                alert("Anggota berhasil ditambahkan!");
                renderMainApp('profil'); // Refresh view
            } catch (error) {
                console.error(error);
                alert("Gagal menambah anggota.");
            }
            hideLoadingOverlay();
        };

        const handleAddTransaction = async (type, amount, date, description) => {
             if (!authUser || !currentFamily || !currentMember) return;
             showLoadingOverlay();
             try {
                const txRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');
                await addDoc(txRef, {
                    familyId: currentFamily.id,
                    memberId: currentMember.id,
                    memberName: currentMember.name,
                    type: type, // 'pemasukan' atau 'pengeluaran'
                    amount: Number(amount),
                    date: date,
                    description: description,
                    createdAt: new Date().toISOString()
                });
                alert("Transaksi berhasil dicatat!");
                activeTab = 'beranda';
                renderMainApp('beranda');
             } catch(e) {
                 console.error(e);
                 alert("Gagal mencatat transaksi.");
             }
             hideLoadingOverlay();
        };

        const logout = () => {
            currentMember = null;
            currentFamily = null;
            localStorage.removeItem('keluargaApp_email');
            renderAuth('login');
        };

        // --- RENDERERS ---

        const renderAuth = (type) => {
            currentView = type;
            bottomNav.classList.add('hidden');
            
            if (type === 'login') {
                appContainer.innerHTML = `
                    <div class="flex-1 flex flex-col justify-center animate-[fadeIn_0.5s_ease-out]">
                        <div class="text-center mb-8">
                            <div class="w-20 h-20 bg-primary/20 rounded-[2rem] flex items-center justify-center mx-auto mb-4">
                                <i data-lucide="users" class="w-10 h-10 text-primary"></i>
                            </div>
                            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Keluarga<span class="text-primary">App</span></h1>
                            <p class="text-sm text-gray-500 mt-2">Kelola Keuangan Keluarga Bersama</p>
                        </div>

                        <form id="login-form" class="bg-white p-6 rounded-[2rem] shadow-card">
                            <h2 class="text-xl font-semibold mb-6">Masuk</h2>
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-600 mb-1 ml-2">Email Anggota</label>
                                <input type="email" id="login-email" required class="w-full bg-cream/50 border border-gray-100 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all" placeholder="email@keluarga.com">
                            </div>
                            <button type="submit" class="w-full bg-primary hover:bg-primaryDark text-white font-medium py-3 rounded-2xl transition-colors shadow-md mt-2">
                                Masuk Aplikasi
                            </button>
                        </form>
                        
                        <p class="text-center mt-6 text-sm text-gray-500">
                            Keluarga belum terdaftar? 
                            <button onclick="document.dispatchEvent(new CustomEvent('changeView', {detail: 'register'}))" class="text-primary font-semibold hover:underline">Daftar Sekarang</button>
                        </p>
                    </div>
                `;
            } else {
                appContainer.innerHTML = `
                    <div class="flex-1 flex flex-col justify-center animate-[fadeIn_0.5s_ease-out] py-8">
                        <div class="text-center mb-6">
                            <h1 class="text-2xl font-bold text-gray-800">Daftar Keluarga Baru</h1>
                        </div>

                        <form id="register-form" class="bg-white p-6 rounded-[2rem] shadow-card">
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-600 mb-1 ml-2">Nama Keluarga</label>
                                <input type="text" id="reg-family-name" required class="w-full bg-cream/50 border border-gray-100 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="Keluarga Cemara">
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-600 mb-1 ml-2">Nama Anda</label>
                                <input type="text" id="reg-name" required class="w-full bg-cream/50 border border-gray-100 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="Budi Santoso">
                            </div>
                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-600 mb-1 ml-2">Email Anda</label>
                                <input type="email" id="reg-email" required class="w-full bg-cream/50 border border-gray-100 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="budi@email.com">
                            </div>
                            <button type="submit" class="w-full bg-primary hover:bg-primaryDark text-white font-medium py-3 rounded-2xl transition-colors shadow-md">
                                Daftarkan Keluarga
                            </button>
                        </form>
                        
                        <p class="text-center mt-6 text-sm text-gray-500">
                            Sudah punya akun? 
                            <button onclick="document.dispatchEvent(new CustomEvent('changeView', {detail: 'login'}))" class="text-primary font-semibold hover:underline">Masuk</button>
                        </p>
                    </div>
                `;
            }
            lucide.createIcons();
            attachAuthListeners();
        };

        const renderMainApp = (tab) => {
            currentView = 'app';
            bottomNav.classList.remove('hidden');
            updateNavUI(tab);
            
            // Get family transactions (Filter in memory - Rule 2)
            const familyTx = allTransactions.filter(t => t.familyId === currentFamily.id);
            const familyMembers = allMembers.filter(m => m.familyId === currentFamily.id);

            let contentHTML = '';

            if (tab === 'beranda') {
                const pemasukan = familyTx.filter(t => t.type === 'pemasukan').reduce((sum, t) => sum + t.amount, 0);
                const pengeluaran = familyTx.filter(t => t.type === 'pengeluaran').reduce((sum, t) => sum + t.amount, 0);
                const saldo = pemasukan - pengeluaran;

                // Transaksi terbaru (max 5)
                const recentTx = familyTx.slice(0, 5);
                let txListHTML = recentTx.length === 0 ? `<p class="text-sm text-gray-400 text-center py-4">Belum ada transaksi</p>` : '';
                recentTx.forEach(tx => {
                    const isIncome = tx.type === 'pemasukan';
                    txListHTML += `
                        <div class="flex items-center justify-between p-3 bg-cream/30 rounded-2xl mb-2">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center ${isIncome ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-500'}">
                                    <i data-lucide="${isIncome ? 'arrow-down-left' : 'arrow-up-right'}" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-semibold text-gray-800">${tx.description}</p>
                                    <p class="text-xs text-gray-500">${tx.memberName} • ${formatDate(tx.date)}</p>
                                </div>
                            </div>
                            <span class="text-sm font-bold ${isIncome ? 'text-green-600' : 'text-red-500'}">
                                ${isIncome ? '+' : '-'}${formatRp(tx.amount)}
                            </span>
                        </div>
                    `;
                });

                contentHTML = `
                    <div class="tab-content pb-6">
                        <header class="flex justify-between items-center mb-6 pt-2">
                            <div>
                                <p class="text-xs text-gray-500">Keluarga ${currentFamily.name}</p>
                                <h2 class="text-xl font-bold text-gray-800">Halo, ${currentMember.name.split(' ')[0]} 👋</h2>
                            </div>
                            <div class="w-10 h-10 bg-primary/20 rounded-full flex items-center justify-center text-primary font-bold">
                                ${currentMember.name.charAt(0).toUpperCase()}
                            </div>
                        </header>

                        <!-- Balance Card -->
                        <div class="bg-primary rounded-[2rem] p-6 text-white shadow-soft relative overflow-hidden mb-6">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 blur-xl"></div>
                            <p class="text-sm font-medium text-white/80 mb-1">Total Saldo</p>
                            <h3 class="text-3xl font-bold mb-6">${formatRp(saldo)}</h3>
                            
                            <div class="flex justify-between">
                                <div>
                                    <p class="text-xs text-white/70 mb-1 flex items-center gap-1"><i data-lucide="arrow-down-left" class="w-3 h-3"></i> Pemasukan</p>
                                    <p class="font-semibold text-sm">${formatRp(pemasukan)}</p>
                                </div>
                                <div>
                                    <p class="text-xs text-white/70 mb-1 flex items-center gap-1"><i data-lucide="arrow-up-right" class="w-3 h-3"></i> Pengeluaran</p>
                                    <p class="font-semibold text-sm">${formatRp(pengeluaran)}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Recent Transactions -->
                        <div>
                            <div class="flex justify-between items-end mb-4">
                                <h3 class="font-bold text-gray-800">Transaksi Terbaru</h3>
                                <button onclick="document.dispatchEvent(new CustomEvent('changeView', {detail: 'riwayat'}))" class="text-xs text-primary font-semibold">Lihat Semua</button>
                            </div>
                            <div class="bg-white rounded-[2rem] p-3 shadow-card">
                                ${txListHTML}
                            </div>
                        </div>
                    </div>
                `;
            } else if (tab === 'catat') {
                const today = new Date().toISOString().split('T')[0];
                contentHTML = `
                    <div class="tab-content pb-6 pt-2">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6">Catat Transaksi</h2>
                        <form id="tx-form" class="bg-white p-6 rounded-[2rem] shadow-card">
                            
                            <div class="grid grid-cols-2 gap-3 mb-6">
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="tx_type" value="pengeluaran" class="peer sr-only" checked>
                                    <div class="p-3 text-center rounded-2xl border border-gray-100 bg-cream/50 peer-checked:bg-red-50 peer-checked:border-red-200 peer-checked:text-red-600 transition-all font-semibold text-sm text-gray-500">
                                        Pengeluaran
                                    </div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="tx_type" value="pemasukan" class="peer sr-only">
                                    <div class="p-3 text-center rounded-2xl border border-gray-100 bg-cream/50 peer-checked:bg-green-50 peer-checked:border-green-200 peer-checked:text-green-600 transition-all font-semibold text-sm text-gray-500">
                                        Pemasukan
                                    </div>
                                </label>
                            </div>

                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-600 mb-1 ml-2">Nominal (Rp)</label>
                                <input type="number" id="tx-amount" required min="1" class="w-full bg-cream/50 border border-gray-100 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50 font-bold text-lg" placeholder="0">
                            </div>
                            
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-600 mb-1 ml-2">Keterangan</label>
                                <input type="text" id="tx-desc" required class="w-full bg-cream/50 border border-gray-100 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="Belanja mingguan / Gaji">
                            </div>

                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-600 mb-1 ml-2">Tanggal</label>
                                <input type="date" id="tx-date" required value="${today}" class="w-full bg-cream/50 border border-gray-100 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50">
                            </div>

                            <button type="submit" class="w-full bg-primary hover:bg-primaryDark text-white font-medium py-3 rounded-2xl transition-colors shadow-md flex justify-center items-center gap-2">
                                <i data-lucide="check-circle" class="w-5 h-5"></i> Simpan Transaksi
                            </button>
                        </form>
                    </div>
                `;
            } else if (tab === 'riwayat') {
                let txListHTML = familyTx.length === 0 ? `<div class="text-center text-gray-400 py-10">Belum ada riwayat transaksi.</div>` : '';
                
                // Group by month/year could be done, but keep simple list for now
                familyTx.forEach(tx => {
                    const isIncome = tx.type === 'pemasukan';
                    txListHTML += `
                        <div class="flex items-center justify-between p-4 bg-white rounded-2xl mb-3 shadow-sm border border-gray-50">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 rounded-full flex items-center justify-center ${isIncome ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-500'}">
                                    <i data-lucide="${isIncome ? 'arrow-down-left' : 'arrow-up-right'}" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-bold text-gray-800">${tx.description}</p>
                                    <p class="text-xs text-gray-500 flex items-center gap-1 mt-0.5"><i data-lucide="user" class="w-3 h-3"></i> ${tx.memberName}</p>
                                    <p class="text-[10px] text-gray-400 mt-0.5">${formatDate(tx.date)}</p>
                                </div>
                            </div>
                            <span class="text-sm font-bold ${isIncome ? 'text-green-600' : 'text-red-500'}">
                                ${isIncome ? '+' : '-'}${formatRp(tx.amount)}
                            </span>
                        </div>
                    `;
                });

                contentHTML = `
                    <div class="tab-content pb-6 pt-2">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6">Riwayat Keluarga</h2>
                        <div class="space-y-1">
                            ${txListHTML}
                        </div>
                    </div>
                `;
            } else if (tab === 'profil') {
                let membersListHTML = '';
                familyMembers.forEach(m => {
                    membersListHTML += `
                        <div class="flex items-center gap-4 p-3 bg-cream/40 rounded-2xl mb-2">
                            <div class="w-12 h-12 bg-primary/20 rounded-full flex items-center justify-center text-primary font-bold text-lg">
                                ${m.name.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <p class="text-sm font-bold text-gray-800">${m.name} ${m.id === currentMember.id ? '<span class="text-[10px] bg-primary/20 text-primary px-2 py-0.5 rounded-full ml-1">Saya</span>' : ''}</p>
                                <p class="text-xs text-gray-500">${m.status} • ${m.email}</p>
                            </div>
                        </div>
                    `;
                });

                contentHTML = `
                    <div class="tab-content pb-6 pt-2">
                        <div class="text-center mb-6">
                            <div class="w-24 h-24 bg-primary/10 rounded-full mx-auto mb-3 flex items-center justify-center">
                                <i data-lucide="users" class="w-10 h-10 text-primary"></i>
                            </div>
                            <h2 class="text-xl font-bold text-gray-800">Keluarga ${currentFamily.name}</h2>
                            <p class="text-xs text-gray-500 mt-1">${familyMembers.length} Anggota Terdaftar</p>
                        </div>

                        <div class="bg-white rounded-[2rem] p-5 shadow-card mb-6">
                            <h3 class="font-bold text-gray-800 mb-4">Anggota Keluarga</h3>
                            ${membersListHTML}
                            
                            <button id="btn-show-add-member" class="w-full mt-2 py-3 rounded-2xl border-2 border-dashed border-gray-200 text-gray-500 font-semibold text-sm hover:border-primary hover:text-primary transition-colors">
                                + Tambah Anggota Baru
                            </button>
                            
                            <!-- Form Tambah Anggota (Hidden by default) -->
                            <form id="form-add-member" class="hidden mt-4 pt-4 border-t border-gray-100">
                                <h4 class="text-sm font-bold mb-3">Data Anggota Baru</h4>
                                <div class="space-y-3 mb-4">
                                    <input type="text" id="new-name" required placeholder="Nama Lengkap" class="w-full bg-cream/50 border border-gray-100 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-primary">
                                    <input type="email" id="new-email" required placeholder="Email" class="w-full bg-cream/50 border border-gray-100 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-primary">
                                    <select id="new-status" required class="w-full bg-cream/50 border border-gray-100 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-primary">
                                        <option value="" disabled selected>Pilih Status</option>
                                        <option value="Suami">Suami</option>
                                        <option value="Istri">Istri</option>
                                        <option value="Anak">Anak</option>
                                        <option value="Lainnya">Lainnya</option>
                                    </select>
                                    <input type="date" id="new-dob" class="w-full bg-cream/50 border border-gray-100 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-primary">
                                </div>
                                <div class="flex gap-2">
                                    <button type="button" id="btn-cancel-add" class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-xl text-sm font-semibold">Batal</button>
                                    <button type="submit" class="flex-1 bg-primary text-white py-2 rounded-xl text-sm font-semibold">Simpan</button>
                                </div>
                            </form>
                        </div>
                        
                        <button onclick="document.dispatchEvent(new CustomEvent('logoutAction'))" class="w-full bg-red-50 text-red-600 font-semibold py-3 rounded-[2rem] flex justify-center items-center gap-2">
                            <i data-lucide="log-out" class="w-4 h-4"></i> Keluar
                        </button>
                    </div>
                `;
            }

            appContainer.innerHTML = contentHTML;
            lucide.createIcons();
            attachAppListeners(tab);
        };

        const updateNavUI = (active) => {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.dataset.tab === active) {
                    btn.classList.remove('text-gray-400');
                    btn.classList.add('text-primary');
                } else {
                    btn.classList.add('text-gray-400');
                    btn.classList.remove('text-primary');
                }
            });
        };

        const renderError = (msg) => {
            appContainer.innerHTML = `<div class="flex-1 flex flex-col items-center justify-center text-center p-6"><i data-lucide="alert-triangle" class="w-12 h-12 text-red-400 mb-4"></i><p class="text-gray-600">${msg}</p></div>`;
            lucide.createIcons();
        };

        const showLoadingOverlay = () => {
            const overlay = document.createElement('div');
            overlay.id = 'loading-overlay';
            overlay.className = 'fixed inset-0 bg-white/50 backdrop-blur-sm z-[100] flex items-center justify-center';
            overlay.innerHTML = '<i data-lucide="loader-2" class="w-10 h-10 animate-spin text-primary"></i>';
            document.body.appendChild(overlay);
            lucide.createIcons();
        };

        const hideLoadingOverlay = () => {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.remove();
        };

        // --- EVENT ATTACHMENTS ---

        const attachAuthListeners = () => {
            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const email = document.getElementById('login-email').value;
                    showLoadingOverlay();
                    setTimeout(() => {
                        if (!attemptLogin(email)) {
                            alert("Email tidak ditemukan. Pastikan sudah didaftarkan oleh keluarga Anda.");
                        }
                        hideLoadingOverlay();
                    }, 500); // Simulate brief network wait
                });
            }

            const regForm = document.getElementById('register-form');
            if (regForm) {
                regForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const fname = document.getElementById('reg-family-name').value;
                    const mname = document.getElementById('reg-name').value;
                    const email = document.getElementById('reg-email').value;
                    handleRegisterFamily(email, fname, mname);
                });
            }
        };

        const attachAppListeners = (tab) => {
            if (tab === 'catat') {
                const txForm = document.getElementById('tx-form');
                if (txForm) {
                    txForm.addEventListener('submit', (e) => {
                        e.preventDefault();
                        const type = document.querySelector('input[name="tx_type"]:checked').value;
                        const amount = document.getElementById('tx-amount').value;
                        const desc = document.getElementById('tx-desc').value;
                        const date = document.getElementById('tx-date').value;
                        handleAddTransaction(type, amount, date, desc);
                    });
                }
            } else if (tab === 'profil') {
                const btnShowAdd = document.getElementById('btn-show-add-member');
                const formAdd = document.getElementById('form-add-member');
                const btnCancelAdd = document.getElementById('btn-cancel-add');

                if (btnShowAdd && formAdd) {
                    btnShowAdd.addEventListener('click', () => {
                        btnShowAdd.classList.add('hidden');
                        formAdd.classList.remove('hidden');
                    });
                    btnCancelAdd.addEventListener('click', () => {
                        formAdd.classList.add('hidden');
                        btnShowAdd.classList.remove('hidden');
                    });
                    formAdd.addEventListener('submit', (e) => {
                        e.preventDefault();
                        const name = document.getElementById('new-name').value;
                        const email = document.getElementById('new-email').value;
                        const status = document.getElementById('new-status').value;
                        const dob = document.getElementById('new-dob').value;
                        handleAddMember(email, name, dob, status);
                    });
                }
            }
        };

        // Global Event Listeners
        document.addEventListener('changeView', (e) => {
            const tab = e.detail;
            if (tab === 'login' || tab === 'register') {
                renderAuth(tab);
            } else {
                activeTab = tab;
                renderMainApp(tab);
            }
        });

        document.addEventListener('logoutAction', () => {
            logout();
        });

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                activeTab = tab;
                renderMainApp(tab);
            });
        });

        // Init
        window.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
