<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KeluargaApp</title>
    
    <!-- PWA Requirements -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8fbcf5">
    <link rel="apple-touch-icon" href="icon-192px.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FDFBF7',
                        primary: '#60A5FA', // Biru Muda
                        primaryDark: '#3B82F6',
                    },
                    boxShadow: {
                        'soft': '0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01)',
                        'card': '0 4px 20px -2px rgba(0,0,0,0.05)'
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .tab-content { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-cream text-gray-800 min-h-screen relative pb-20">

    <!-- Main Container -->
    <main id="app-container" class="max-w-md mx-auto min-h-screen p-4 flex flex-col">
        <!-- Loading State -->
        <div class="flex-1 flex items-center justify-center">
            <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-primary"></i>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto glass-nav rounded-t-[2rem] shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.05)] border-t border-gray-100 flex justify-between px-3 py-4 z-50">
        <button class="nav-btn flex flex-col items-center gap-1 text-primary w-1/5" data-tab="beranda">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] font-semibold">Beranda</span>
        </button>
        <button class="nav-btn flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors w-1/5" data-tab="catat">
            <i data-lucide="plus-circle" class="w-6 h-6"></i>
            <span class="text-[10px] font-semibold">Catat</span>
        </button>
        <button class="nav-btn flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors w-1/5" data-tab="tabungan">
            <i data-lucide="credit-card" class="w-6 h-6"></i>
            <span class="text-[10px] font-semibold">Tabungan</span>
        </button>
        <button class="nav-btn flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors w-1/5" data-tab="riwayat">
            <i data-lucide="clock" class="w-6 h-6"></i>
            <span class="text-[10px] font-semibold">Riwayat</span>
        </button>
        <button class="nav-btn flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors w-1/5" data-tab="profil">
            <i data-lucide="user" class="w-6 h-6"></i>
            <span class="text-[10px] font-semibold">Profil</span>
        </button>
    </nav>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>

    <!-- Firebase & App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyB0KCnGcUT21bbIfeDEXyTjmE4QHYkPXMI",
                authDomain: "keuangan-7d7cb.firebaseapp.com",
                projectId: "keuangan-7d7cb",
                storageBucket: "keuangan-7d7cb.firebasestorage.app",
                messagingSenderId: "525596980737",
                appId: "1:525596980737:web:052efa8e99b3e9ac8d7200"
            };
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'keluarga-app-v1';
        
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) {
            console.error("Firebase init error:", e);
        }

        // State Aplikasi
        let isFirebaseReady = false;
        let authUser = null;
        let currentView = 'login'; 
        let activeTab = 'beranda';
        
        // Data State
        let allFamilies = [];
        let allMembers = [];
        let allTransactions = [];
        let allCategories = []; // State untuk Kategori
        let currentFamily = null;
        let currentMember = null;
        
        // Listeners
        let unsubFamilies, unsubMembers, unsubTransactions, unsubCategories;

        // DOM Elements
        const appContainer = document.getElementById('app-container');
        const bottomNav = document.getElementById('bottom-nav');

        // Formatter Uang
        const formatRp = (angka) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        };
        const formatDate = (dateStr) => {
            const d = new Date(dateStr);
            return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
        };

        // Modal Custom & Alerts
        window.closeModal = () => {
            const modal = document.getElementById('global-modal');
            if(modal) modal.classList.add('hidden');
        };

        const showModal = (contentHTML) => {
            let modal = document.getElementById('global-modal');
            if(!modal) {
                modal = document.createElement('div');
                modal.id = 'global-modal';
                modal.className = 'fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-[110] flex items-center justify-center p-4 animate-[fadeIn_0.2s_ease-out]';
                document.body.appendChild(modal);
            }
            modal.innerHTML = `
                <div class="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-2xl transform scale-100 transition-all">
                    ${contentHTML}
                </div>
            `;
            modal.classList.remove('hidden');
            lucide.createIcons();
        };

        const customAlert = (msg) => {
            showModal(`
                <div class="text-center">
                    <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-500">
                        <i data-lucide="info" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-lg font-bold text-gray-800 mb-2">Informasi</h3>
                    <p class="text-sm text-gray-600 mb-6">${msg}</p>
                    <button onclick="window.closeModal()" class="w-full bg-primary hover:bg-primaryDark text-white font-medium py-3 rounded-2xl transition-colors">Tutup</button>
                </div>
            `);
        };

        const customConfirm = (msg, onConfirm) => {
            window.pendingConfirm = onConfirm;
            showModal(`
                <div class="text-center">
                    <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500">
                        <i data-lucide="alert-triangle" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-lg font-bold text-gray-800 mb-2">Konfirmasi</h3>
                    <p class="text-sm text-gray-600 mb-6">${msg}</p>
                    <div class="flex gap-3">
                        <button onclick="window.closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 rounded-2xl transition-colors">Batal</button>
                        <button onclick="window.closeModal(); if(window.pendingConfirm) window.pendingConfirm();" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-medium py-3 rounded-2xl transition-colors">Ya, Lanjutkan</button>
                    </div>
                </div>
            `);
        };

        // Initialize App
        const initApp = async () => {
            if(!auth) {
                renderError("Firebase belum dikonfigurasi.");
                return;
            }

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        authUser = user;
                        isFirebaseReady = true;
                        setupRealtimeListeners();
                        
                        const savedEmail = localStorage.getItem('keluargaApp_email');
                        if (savedEmail) {
                            setTimeout(() => attemptLogin(savedEmail), 1000);
                        } else {
                            renderAuth('login');
                        }
                    }
                });
            } catch (error) {
                console.error("Auth error:", error);
                renderError("Gagal terhubung ke database.");
            }
        };

        // Realtime Listeners
        const setupRealtimeListeners = () => {
            if (!authUser) return;

            const familiesRef = collection(db, 'artifacts', appId, 'public', 'data', 'families');
            const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
            const txRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');
            const catRef = collection(db, 'artifacts', appId, 'public', 'data', 'categories'); // Referensi Kategori

            unsubFamilies = onSnapshot(familiesRef, (snapshot) => {
                allFamilies = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateUIIfLoggedIn();
            }, (err) => console.error(err));

            unsubMembers = onSnapshot(membersRef, (snapshot) => {
                allMembers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateUIIfLoggedIn();
            }, (err) => console.error(err));

            unsubTransactions = onSnapshot(txRef, (snapshot) => {
                allTransactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                allTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));
                updateUIIfLoggedIn();
            }, (err) => console.error(err));

            unsubCategories = onSnapshot(catRef, (snapshot) => {
                allCategories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateUIIfLoggedIn();
            }, (err) => console.error(err));
        };

        const updateUIIfLoggedIn = () => {
            if (currentMember && currentFamily) {
                currentMember = allMembers.find(m => m.id === currentMember.id) || null;
                currentFamily = allFamilies.find(f => f.id === currentFamily.id) || null;
                if(currentView !== 'login' && currentView !== 'register') {
                    renderMainApp(activeTab);
                }
            }
        };

        // --- AUTHENTICATION & DATA LOGIC ---

        const attemptLogin = (email) => {
            const member = allMembers.find(m => m.email.toLowerCase() === email.toLowerCase());
            if (member) {
                const family = allFamilies.find(f => f.id === member.familyId);
                if (family) {
                    currentMember = member;
                    currentFamily = family;
                    localStorage.setItem('keluargaApp_email', email);
                    activeTab = 'beranda';
                    renderMainApp('beranda');
                    return true;
                }
            }
            return false;
        };

        const handleRegisterFamily = async (email, familyName, memberName) => {
            if (!authUser) return;
            showLoadingOverlay();
            try {
                if (allMembers.find(m => m.email.toLowerCase() === email.toLowerCase())) {
                    customAlert("Email sudah terdaftar!");
                    hideLoadingOverlay();
                    return;
                }

                // 1. Buat Keluarga
                const familiesRef = collection(db, 'artifacts', appId, 'public', 'data', 'families');
                const familyDoc = await addDoc(familiesRef, {
                    name: familyName,
                    createdAt: new Date().toISOString()
                });

                // 2. Buat Anggota
                const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                await addDoc(membersRef, {
                    familyId: familyDoc.id,
                    email: email.toLowerCase(),
                    name: memberName,
                    dob: '',
                    status: 'Kepala Keluarga',
                    createdAt: new Date().toISOString()
                });

                // 3. Buat Kategori Default agar aplikasi tidak kosong
                const catRef = collection(db, 'artifacts', appId, 'public', 'data', 'categories');
                const defaultCategories = [
                    { name: 'Gaji / Pendapatan', type: 'pemasukan' },
                    { name: 'Makanan & Minuman', type: 'pengeluaran' },
                    { name: 'Transportasi', type: 'pengeluaran' },
                    { name: 'Tagihan Listrik/Air', type: 'pengeluaran' },
                    { name: 'Pendidikan', type: 'pengeluaran' },
                    { name: 'Dana Darurat', type: 'tabungan' },
                    { name: 'Pendidikan Anak', type: 'tabungan' }
                ];
                
                for(let cat of defaultCategories) {
                    await addDoc(catRef, {
                        familyId: familyDoc.id,
                        name: cat.name,
                        type: cat.type,
                        createdAt: new Date().toISOString()
                    });
                }

                setTimeout(() => {
                    attemptLogin(email);
                    hideLoadingOverlay();
                }, 1000);

            } catch (error) {
                console.error("Register err:", error);
                customAlert("Terjadi kesalahan.");
                hideLoadingOverlay();
            }
        };

        const handleAddMember = async (email, name, dob, status) => {
            if (!authUser || !currentFamily) return;
            if (allMembers.find(m => m.email.toLowerCase() === email.toLowerCase())) {
                customAlert("Email anggota ini sudah terdaftar!");
                return;
            }
            showLoadingOverlay();
            try {
                const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                await addDoc(membersRef, {
                    familyId: currentFamily.id,
                    email: email.toLowerCase(),
                    name: name,
                    dob: dob,
                    status: status,
                    createdAt: new Date().toISOString()
                });
                customAlert("Anggota berhasil ditambahkan!");
            } catch (error) {
                console.error(error);
                customAlert("Gagal menambah anggota.");
            }
            hideLoadingOverlay();
        };

        // Fungsi Tambah Kategori Baru
        const handleAddCategory = async (name, type) => {
            if (!authUser || !currentFamily) return;
            showLoadingOverlay();
            try {
                const catRef = collection(db, 'artifacts', appId, 'public', 'data', 'categories');
                await addDoc(catRef, {
                    familyId: currentFamily.id,
                    name: name,
                    type: type,
                    createdAt: new Date().toISOString()
                });
                customAlert("Kategori berhasil ditambahkan!");
            } catch (error) {
                console.error(error);
                customAlert("Gagal menambah kategori.");
            }
            hideLoadingOverlay();
        };

        const handleAddTransaction = async (type, category, amount, date, description, redirectTab = 'beranda') => {
             if (!authUser || !currentFamily || !currentMember) return;
             showLoadingOverlay();
             try {
                const txRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');
                await addDoc(txRef, {
                    familyId: currentFamily.id,
                    memberId: currentMember.id,
                    memberName: currentMember.name,
                    type: type,
                    category: category, // Simpan kategori
                    amount: Number(amount),
                    date: date,
                    description: description,
                    createdAt: new Date().toISOString()
                });
                customAlert("Transaksi berhasil dicatat!");
                activeTab = redirectTab;
                renderMainApp(redirectTab);
             } catch(e) {
                 console.error(e);
                 customAlert("Gagal mencatat transaksi.");
             }
             hideLoadingOverlay();
        };

        const handleEditTransaction = (txId) => {
            const tx = allTransactions.find(t => t.id === txId);
            if(!tx) return;

            // Dapatkan tipe kategori untuk difilter
            let filterType = tx.type;
            if(tx.type === 'tabungan_masuk' || tx.type === 'tabungan_keluar') filterType = 'tabungan';
            
            let catOptions = '';
            allCategories.filter(c => c.familyId === currentFamily.id && c.type === filterType).forEach(c => {
                catOptions += `<option value="${c.name}" ${tx.category === c.name ? 'selected' : ''}>${c.name}</option>`;
            });

            if(catOptions === '') catOptions = `<option value="${tx.category}" selected>${tx.category}</option>`;

            showModal(`
                <h3 class="text-xl font-bold text-gray-800 mb-4 text-left">Edit Transaksi</h3>
                <form id="form-edit-tx" class="text-left">
                    <input type="hidden" id="edit-tx-id" value="${tx.id}">
                    <div class="mb-3">
                        <label class="block text-xs font-medium text-gray-600 mb-1 ml-1">Kategori</label>
                        <select id="edit-tx-cat" required class="w-full bg-cream/50 border border-gray-100 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50">
                            ${catOptions}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="block text-xs font-medium text-gray-600 mb-1 ml-1">Nominal (Rp)</label>
                        <input type="number" id="edit-tx-amount" required min="1" value="${tx.amount}" class="w-full bg-cream/50 border border-gray-100 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 font-bold">
                    </div>
                    <div class="mb-3">
                        <label class="block text-xs font-medium text-gray-600 mb-1 ml-1">Keterangan</label>
                        <input type="text" id="edit-tx-desc" required value="${tx.description}" class="w-full bg-cream/50 border border-gray-100 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50">
                    </div>
                    <div class="mb-4">
                        <label class="block text-xs font-medium text-gray-600 mb-1 ml-1">Tanggal</label>
                        <input type="date" id="edit-tx-date" required value="${tx.date}" class="w-full bg-cream/50 border border-gray-100 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50">
                    </div>
                    <div class="flex gap-2">
                        <button type="button" onclick="window.closeModal()" class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-xl text-sm font-semibold">Batal</button>
                        <button type="submit" class="flex-1 bg-primary text-white py-2 rounded-xl text-sm font-semibold">Simpan</button>
                    </div>
                </form>
            `);

            document.getElementById('form-edit-tx').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newCat = document.getElementById('edit-tx-cat').value;
                const newAmount = Number(document.getElementById('edit-tx-amount').value);
                const newDesc = document.getElementById('edit-tx-desc').value;
                const newDate = document.getElementById('edit-tx-date').value;
                
                showLoadingOverlay();
                try {
                    const txRef = doc(db, 'artifacts', appId, 'public', 'data', 'transactions', txId);
                    await updateDoc(txRef, {
                        category: newCat,
                        amount: newAmount,
                        description: newDesc,
                        date: newDate
                    });
                    window.closeModal();
                    customAlert("Transaksi berhasil diperbarui!");
                } catch(error) {
                    console.error(error);
                    customAlert("Gagal memperbarui transaksi.");
                }
                hideLoadingOverlay();
            });
        };

        const confirmDeleteTransaction = (txId) => {
            customConfirm("Apakah Anda yakin ingin menghapus transaksi ini? Data yang dihapus tidak dapat dikembalikan.", async () => {
                showLoadingOverlay();
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'transactions', txId));
                    customAlert("Transaksi berhasil dihapus!");
                } catch(error) {
                    console.error(error);
                    customAlert("Gagal menghapus transaksi.");
                }
                hideLoadingOverlay();
            });
        };

        const logout = () => {
            currentMember = null;
            currentFamily = null;
            localStorage.removeItem('keluargaApp_email');
            renderAuth('login');
        };

        // --- RENDERERS ---

        const renderAuth = (type) => {
            // (Kode Auth tetap sama seperti sebelumnya)
            currentView = type;
            bottomNav.classList.add('hidden');
            
            if (type === 'login') {
                appContainer.innerHTML = `
                    <div class="flex-1 flex flex-col justify-center animate-[fadeIn_0.5s_ease-out]">
                        <div class="text-center mb-8">
                            <div class="w-20 h-20 bg-primary/20 rounded-[2rem] flex items-center justify-center mx-auto mb-4">
                                <i data-lucide="users" class="w-10 h-10 text-primary"></i>
                            </div>
                            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Keluarga<span class="text-primary">App</span></h1>
                            <p class="text-sm text-gray-500 mt-2">Kelola Keuangan Keluarga Bersama</p>
                        </div>
                        <form id="login-form" class="bg-white p-6 rounded-[2rem] shadow-card">
                            <h2 class="text-xl font-semibold mb-6">Masuk</h2>
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-600 mb-1 ml-2">Email Anggota</label>
                                <input type="email" id="login-email" required class="w-full bg-cream/50 border border-gray-100 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all" placeholder="email@keluarga.com">
                            </div>
                            <button type="submit" class="w-full bg-primary hover:bg-primaryDark text-white font-medium py-3 rounded-2xl transition-colors shadow-md mt-2">
                                Masuk Aplikasi
                            </button>
                        </form>
                        <p class="text-center mt-6 text-sm text-gray-500">
                            Keluarga belum terdaftar? 
                            <button onclick="document.dispatchEvent(new CustomEvent('changeView', {detail: 'register'}))" class="text-primary font-semibold hover:underline">Daftar Sekarang</button>
                        </p>
                    </div>
                `;
            } else {
                appContainer.innerHTML = `
                    <div class="flex-1 flex flex-col justify-center animate-[fadeIn_0.5s_ease-out] py-8">
                        <div class="text-center mb-6">
                            <h1 class="text-2xl font-bold text-gray-800">Daftar Keluarga Baru</h1>
                        </div>
                        <form id="register-form" class="bg-white p-6 rounded-[2rem] shadow-card">
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-600 mb-1 ml-2">Nama Keluarga</label>
                                <input type="text" id="reg-family-name" required class="w-full bg-cream/50 border border-gray-100 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="Keluarga Cemara">
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-600 mb-1 ml-2">Nama Anda</label>
                                <input type="text" id="reg-name" required class="w-full bg-cream/50 border border-gray-100 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="Budi Santoso">
                            </div>
                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-600 mb-1 ml-2">Email Anda</label>
                                <input type="email" id="reg-email" required class="w-full bg-cream/50 border border-gray-100 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="budi@email.com">
                            </div>
                            <button type="submit" class="w-full bg-primary hover:bg-primaryDark text-white font-medium py-3 rounded-2xl transition-colors shadow-md">
                                Daftarkan Keluarga
                            </button>
                        </form>

                                ${categoriesListHTML}
                            </div>
                            
                            <button id="btn-show-add-category" class="w-full py-2 rounded-xl border border-dashed border-gray-300 text-gray-500 font-semibold text-xs hover:border-primary hover:text-primary transition-colors">
                                + Tambah Kategori Baru
                            </button>
                            
                            <form id="form-add-category" class="hidden mt-3 pt-3 border-t border-gray-100">
                                <div class="flex gap-2 mb-3">
                                    <input type="text" id="new-cat-name" required placeholder="Nama Kategori (Cth: Listrik)" class="flex-1 bg-cream/50 border border-gray-100 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-primary">
                                    <select id="new-cat-type" required class="w-1/3 bg-cream/50 border border-gray-100 rounded-xl px-2 py-2 text-xs focus:outline-none focus:border-primary">
                                        <option value="pengeluaran">Pengeluaran</option>
                                        <option value="pemasukan">Pemasukan</option>
                                        <option value="tabungan">Tabungan</option>
                                    </select>
                                </div>
                                <div class="flex gap-2">
                                    <button type="button" id="btn-cancel-add-category" class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-xl text-xs font-semibold">Batal</button>
                                    <button type="submit" class="flex-1 bg-primary text-white py-2 rounded-xl text-xs font-semibold">Simpan Kategori</button>
                                </div>
                            </form>
                        </div>
                        
                        <button onclick="document.dispatchEvent(new CustomEvent('logoutAction'))" class="w-full bg-red-50 text-red-600 font-semibold py-3 rounded-[2rem] flex justify-center items-center gap-2">
                            <i data-lucide="log-out" class="w-4 h-4"></i> Keluar
                        </button>
                    </div>
                `;
            }

            appContainer.innerHTML = contentHTML;
            lucide.createIcons();
            attachAppListeners(tab);
        };

        const updateNavUI = (active) => {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.dataset.tab === active) {
                    btn.classList.remove('text-gray-400');
                    btn.classList.add('text-primary');
                } else {
                    btn.classList.add('text-gray-400');
                    btn.classList.remove('text-primary');
                }
            });
        };

        const renderError = (msg) => {
            appContainer.innerHTML = `<div class="flex-1 flex flex-col items-center justify-center text-center p-6"><i data-lucide="alert-triangle" class="w-12 h-12 text-red-400 mb-4"></i><p class="text-gray-600">${msg}</p></div>`;
            lucide.createIcons();
        };

        const showLoadingOverlay = () => {
            const overlay = document.createElement('div');
            overlay.id = 'loading-overlay';
            overlay.className = 'fixed inset-0 bg-white/50 backdrop-blur-sm z-[100] flex items-center justify-center';
            overlay.innerHTML = '<i data-lucide="loader-2" class="w-10 h-10 animate-spin text-primary"></i>';
            document.body.appendChild(overlay);
            lucide.createIcons();
        };

        const hideLoadingOverlay = () => {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.remove();
        };

        // --- EVENT ATTACHMENTS ---

        const attachAuthListeners = () => {
            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const email = document.getElementById('login-email').value;
                    showLoadingOverlay();
                    setTimeout(() => {
                        if (!attemptLogin(email)) {
                            customAlert("Email tidak ditemukan. Pastikan sudah didaftarkan oleh keluarga Anda.");
                        }
                        hideLoadingOverlay();
                    }, 500); 
                });
            }

            const regForm = document.getElementById('register-form');
            if (regForm) {
                regForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const fname = document.getElementById('reg-family-name').value;
                    const mname = document.getElementById('reg-name').value;
                    const email = document.getElementById('reg-email').value;
                    handleRegisterFamily(email, fname, mname);
                });
            }
        };

        const attachAppListeners = (tab) => {
            if (tab === 'catat') {
                const txForm = document.getElementById('tx-form');
                const radioPengeluaran = document.getElementById('radio-pengeluaran');
                const radioPemasukan = document.getElementById('radio-pemasukan');
                const categorySelect = document.getElementById('tx-category');
                
                // Logika mengisi dropdown Kategori dinamis
                const updateCategoryDropdown = (type) => {
                    const familyCats = allCategories.filter(c => c.familyId === currentFamily.id && c.type === type);
                    let html = '<option value="" disabled selected>-- Pilih Kategori --</option>';
                    familyCats.forEach(c => html += `<option value="${c.name}">${c.name}</option>`);
                    if(familyCats.length === 0) html += `<option value="" disabled>Belum ada kategori (Tambahkan di menu Profil)</option>`;
                    categorySelect.innerHTML = html;
                };

                // Panggil pertama kali saat halaman Catat dimuat (default: pengeluaran)
                updateCategoryDropdown('pengeluaran');

                // Listener perubahan radio button
                radioPengeluaran.addEventListener('change', () => updateCategoryDropdown('pengeluaran'));
                radioPemasukan.addEventListener('change', () => updateCategoryDropdown('pemasukan'));

                if (txForm) {
                    txForm.addEventListener('submit', (e) => {
                        e.preventDefault();
                        const type = document.querySelector('input[name="tx_type"]:checked').value;
                        const category = document.getElementById('tx-category').value;
                        const amount = document.getElementById('tx-amount').value;
                        const desc = document.getElementById('tx-desc').value;
                        const date = document.getElementById('tx-date').value;
                        
                        if(!category) {
                            customAlert("Silakan pilih kategori transaksi terlebih dahulu!");
                            return;
                        }
                        
                        handleAddTransaction(type, category, amount, date, desc, 'beranda');
                    });
                }
            } else if (tab === 'tabungan') {
                const formTabungan = document.getElementById('form-tabungan');
                if (formTabungan) {
                    const tabCategorySelect = document.getElementById('tab-category');
                    const updateTabCategoryDropdown = () => {
                        const familyCats = allCategories.filter(c => c.familyId === currentFamily.id && c.type === 'tabungan');
                        let html = '<option value="" disabled selected>-- Pilih Kategori --</option>';
                        familyCats.forEach(c => html += `<option value="${c.name}">${c.name}</option>`);
                        if(familyCats.length === 0) html += `<option value="" disabled>Belum ada kategori tabungan (Tambahkan di Profil)</option>`;
                        if(tabCategorySelect) tabCategorySelect.innerHTML = html;
                    };

                    updateTabCategoryDropdown();

                    formTabungan.addEventListener('submit', (e) => {
                        e.preventDefault();
                        const type = document.querySelector('input[name="tab_type"]:checked').value;
                        const category = document.getElementById('tab-category').value;
                        const amount = Number(document.getElementById('tab-amount').value);
                        const desc = document.getElementById('tab-desc').value;
                        const date = document.getElementById('tab-date').value;

                        if(!category) {
                            customAlert("Silakan pilih kategori tabungan terlebih dahulu!");
                            return;
                        }

                        // Perhitungan validasi realtime
                        const familyTx = allTransactions.filter(t => t.familyId === currentFamily.id);
                        const pemasukan = familyTx.filter(t => t.type === 'pemasukan').reduce((sum, t) => sum + t.amount, 0);
                        const pengeluaranKas = familyTx.filter(t => t.type === 'pengeluaran').reduce((sum, t) => sum + t.amount, 0);
                        const tabMasuk = familyTx.filter(t => t.type === 'tabungan_masuk').reduce((sum, t) => sum + t.amount, 0);
                        const tabKeluar = familyTx.filter(t => t.type === 'tabungan_keluar').reduce((sum, t) => sum + t.amount, 0);
                        
                        const saldoKas = pemasukan - pengeluaranKas - tabMasuk;
                        const saldoTabungan = tabMasuk - tabKeluar;

                        if (type === 'tabungan_masuk' && amount > saldoKas) {
                            customAlert("Gagal! Saldo Kas Tersedia tidak cukup untuk ditabung.");
                            return;
                        }

                        if (type === 'tabungan_keluar' && amount > saldoTabungan) {
                            customAlert("Gagal! Saldo Tabungan Anda tidak mencukupi untuk ditarik.");
                            return;
                        }

                        handleAddTransaction(type, category, amount, date, desc, 'tabungan');
                    });
                }
            } else if (tab === 'profil') {
                // Logika Form Anggota
                const btnShowAddMember = document.getElementById('btn-show-add-member');
                const formAddMember = document.getElementById('form-add-member');
                const btnCancelAddMember = document.getElementById('btn-cancel-add-member');

                if (btnShowAddMember) {
                    btnShowAddMember.addEventListener('click', () => {
                        btnShowAddMember.classList.add('hidden');
                        formAddMember.classList.remove('hidden');
                    });
                    btnCancelAddMember.addEventListener('click', () => {
                        formAddMember.classList.add('hidden');
                        btnShowAddMember.classList.remove('hidden');
                    });
                    formAddMember.addEventListener('submit', (e) => {
                        e.preventDefault();
                        const name = document.getElementById('new-name').value;
                        const email = document.getElementById('new-email').value;
                        const status = document.getElementById('new-status').value;
                        const dob = document.getElementById('new-dob').value;
                        handleAddMember(email, name, dob, status);
                    });
                }

                // Logika Form Kategori
                const btnShowAddCategory = document.getElementById('btn-show-add-category');
                const formAddCategory = document.getElementById('form-add-category');
                const btnCancelAddCategory = document.getElementById('btn-cancel-add-category');

                if (btnShowAddCategory) {
                    btnShowAddCategory.addEventListener('click', () => {
                        btnShowAddCategory.classList.add('hidden');
                        formAddCategory.classList.remove('hidden');
                    });
                    btnCancelAddCategory.addEventListener('click', () => {
                        formAddCategory.classList.add('hidden');
                        btnShowAddCategory.classList.remove('hidden');
                    });
                    formAddCategory.addEventListener('submit', (e) => {
                        e.preventDefault();
                        const name = document.getElementById('new-cat-name').value;
                        const type = document.getElementById('new-cat-type').value;
                        handleAddCategory(name, type);
                    });
                }
            }
        };

        // Global Event Listeners
        document.addEventListener('changeView', (e) => {
            const tab = e.detail;
            if (tab === 'login' || tab === 'register') {
                renderAuth(tab);
            } else {
                activeTab = tab;
                renderMainApp(tab);
            }
        });

        document.addEventListener('editTx', (e) => handleEditTransaction(e.detail));
        document.addEventListener('deleteTx', (e) => confirmDeleteTransaction(e.detail));

        document.addEventListener('logoutAction', () => {
            logout();
        });

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                activeTab = tab;
                renderMainApp(tab);
            });
        });

        // Init
        window.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
